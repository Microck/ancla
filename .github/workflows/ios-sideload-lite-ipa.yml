name: ios-sideload-lite-ipa

on:
  workflow_dispatch:
    inputs:
      build_number:
        description: Optional numeric CFBundleVersion override. Defaults to the GitHub run number.
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ios-sideload-lite-ipa-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  build-unsigned-ipa:
    runs-on: macos-15
    env:
      APP_SCHEME: AnclaLite
      APP_BUNDLE_NAME: AnclaLite.app
      PROJECT_PATH: ios/Ancla.xcodeproj
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve build number
        id: build-number
        shell: bash
        run: |
          value="${{ inputs.build_number }}"
          if [ -z "$value" ]; then
            value="${{ github.run_number }}"
          fi

          case "$value" in
            *[!0-9]*)
              echo "build_number must be numeric, got: $value" >&2
              exit 1
              ;;
          esac

          echo "value=$value" >> "$GITHUB_OUTPUT"
          echo "BUILD_NUMBER=$value" >> "$GITHUB_ENV"

      - name: Prepare build paths
        id: paths
        shell: bash
        run: |
          echo "archive=$RUNNER_TEMP/ancla-lite-unsigned.xcarchive" >> "$GITHUB_OUTPUT"
          echo "ipa_staging=$RUNNER_TEMP/ancla-lite-ipa" >> "$GITHUB_OUTPUT"
          echo "derived_data=$RUNNER_TEMP/ancla-lite-derived-data" >> "$GITHUB_OUTPUT"

      - name: Install XcodeGen
        shell: bash
        run: brew install xcodegen

      - name: Stamp build number
        shell: bash
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" ios/ancla-app/Info.plist

      - name: Generate Xcode project
        shell: bash
        run: |
          cd ios
          xcodegen generate

      - name: Build unsigned archive
        shell: bash
        run: |
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$APP_SCHEME" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${{ steps.paths.outputs.archive }}" \
            -derivedDataPath "${{ steps.paths.outputs.derived_data }}" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            clean archive

      - name: Verify app bundle
        shell: bash
        run: |
          app_path="${{ steps.paths.outputs.archive }}/Products/Applications/$APP_BUNDLE_NAME"
          if [ ! -d "$app_path" ]; then
            echo "Missing app bundle at $app_path" >&2
            exit 1
          fi

          echo "App bundle contents:"
          find "$app_path" -maxdepth 2 | sort

      - name: Package unsigned ipa
        id: package
        shell: bash
        run: |
          app_path="${{ steps.paths.outputs.archive }}/Products/Applications/$APP_BUNDLE_NAME"
          payload_path="${{ steps.paths.outputs.ipa_staging }}/Payload"
          mkdir -p "$payload_path"
          cp -R "$app_path" "$payload_path/"

          cd "${{ steps.paths.outputs.ipa_staging }}"
          ipa_name="ancla-lite-unsigned-${{ steps.build-number.outputs.value }}.ipa"
          /usr/bin/zip -qry "$ipa_name" Payload
          echo "path=${{ steps.paths.outputs.ipa_staging }}/$ipa_name" >> "$GITHUB_OUTPUT"

      - name: Upload unsigned ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ancla-lite-unsigned-ipa-${{ steps.build-number.outputs.value }}
          path: ${{ steps.package.outputs.path }}
          if-no-files-found: error

      - name: Upload xcarchive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ancla-lite-unsigned-xcarchive-${{ steps.build-number.outputs.value }}
          path: ${{ steps.paths.outputs.archive }}
          if-no-files-found: error
